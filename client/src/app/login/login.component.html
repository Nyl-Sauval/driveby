<div *ngIf="authService.isLoggedIn()" class="login-container">
  <h1>Connexion</h1>
  <p>Veuillez entrer vos identifiants pour vous connecter.</p>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Email</mat-label>
      <input matInput formControlName="email" type="email" required />
      <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
        Email valide requis
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="fill" class="full-width">
      <mat-label>Mot de passe</mat-label>
      <input matInput formControlName="password" type="password" required minlength="8" />
    </mat-form-field>
    <button mat-raised-button color="primary" type="submit" [disabled]="loginForm.invalid">Se connecter</button>
  </form>
</div>
