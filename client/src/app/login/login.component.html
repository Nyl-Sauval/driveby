<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="icon-circle">
        <mat-icon>lock_open</mat-icon>
      </div>
      <h1>Connexion</h1>
      <p class="subtitle">Accédez à votre espace DriveBy</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" required placeholder="Ex. jean.dupont@gmail.com" />
        <mat-icon matSuffix>mail</mat-icon>
        <mat-error *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Email valide requis
        </mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Mot de passe</mat-label>
        <input matInput formControlName="password" type="password" required minlength="8" placeholder="••••••••" />
        <mat-icon matSuffix>vpn_key</mat-icon>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit" [disabled]="loginForm.invalid" class="btn-login">
        Se connecter
      </button>
    </form>
  </div>
</div>
