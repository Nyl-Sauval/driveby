<div class="profil-content">

  <h1>Votre profil</h1>

  <div class="profil-details">
    <mat-icon class="mat-icon-profil">account_circle</mat-icon>
    <h1>{{fistname}} {{ name }}</h1>
    <p class="profil-email">
      <mat-icon>alternate_email</mat-icon>
      {{email}}
    </p>
    <p class="profil-phone">
      <mat-icon>call</mat-icon>
      {{phone}}
    </p>
    <p class="profil-birth">
      <mat-icon>cake</mat-icon>
      {{birth}}
    </p>
  </div>
</div>
