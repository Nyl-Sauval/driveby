<main class="main">
  <header>
    <a class="logo-link" routerLink="/">
      <img class="logo" src="assets/logo.svg" alt="Logo DriveBy">
    </a>

    <div class="right-part">
        <button *ngIf="!(auth.isLoggedIn$ | async)" mat-button (click)="openLogin()" class="button-connexion">Connexion</button>
        <button *ngIf="!(auth.isLoggedIn$ | async)" mat-button (click)="openSignin()" class="button-connexion">Enregistrement</button>

      <button *ngIf="(auth.isAgent$ | async)" routerLink="/agent" class="button-profil">
        <mat-icon>account_circle</mat-icon>
        Agent
      </button>


      <button *ngIf="((auth.isLoggedIn$ | async) && !(auth.isAgent$ | async))" routerLink="/profil" class="button-profil">
        <mat-icon>account_circle</mat-icon>
        Profil
      </button>
      <button mat-button (click)="auth.logout()" class="button-connexion" *ngIf="(auth.isLoggedIn$ | async)">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </header>

  <app-breadcrumb></app-breadcrumb>

  <div class="content">
    <router-outlet></router-outlet>
  </div>
  <footer>
    <div class="footer-inner">
      <div class="copyrights">
        &copy; 2025 DriveOps. Tous droits réservés.
      </div>
      <div class="footer-links">
        <a routerLink="/mentions" class="footer-link">Mentions légales</a>
        <span class="footer-sep">·</span>
        <span class="footer-note">Site fictif — Projet pédagogique</span>
      </div>
    </div>
  </footer>
</main>
