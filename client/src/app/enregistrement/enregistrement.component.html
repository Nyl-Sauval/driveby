<div class="register-wrapper">
  <div class="register-card">
    <div class="register-header">
      <div class="icon-circle">
        <mat-icon>person_add</mat-icon>
      </div>
      <h1>Créer un compte</h1>
      <p class="subtitle">Rejoignez DriveBy dès aujourd'hui</p>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="register-form">
      <div class="form-row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Nom</mat-label>
          <input matInput formControlName="name" required placeholder="Dupont" />
          <mat-error *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
            Nom requis
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Prénom</mat-label>
          <input matInput formControlName="firstname" required placeholder="Jean" />
          <mat-error *ngIf="registerForm.get('firstname')?.invalid && registerForm.get('firstname')?.touched">
            Prénom requis
          </mat-error>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" required placeholder="jean.dupont@gmail.com" />
        <mat-icon matSuffix>mail</mat-icon>
        <mat-error *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Email valide requis
        </mat-error>
      </mat-form-field>

      <div class="form-row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Téléphone</mat-label>
          <input matInput formControlName="phone" required placeholder="0612345678" />
          <mat-icon matSuffix>phone</mat-icon>
          <mat-error *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched">
            10 chiffres requis
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Date de naissance</mat-label>
          <input matInput formControlName="dob" type="date" required />
          <mat-error *ngIf="registerForm.get('dob')?.invalid && registerForm.get('dob')?.touched">
            Date passée requise
          </mat-error>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Mot de passe</mat-label>
          <input matInput formControlName="password" type="password" required minlength="8" placeholder="••••••••" />
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
            Min. 8 caractères
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="half-width">
          <mat-label>Confirmation</mat-label>
          <input matInput formControlName="passwordConfirm" type="password" required placeholder="••••••••" />
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="registerForm.get('passwordConfirm')?.invalid && registerForm.get('passwordConfirm')?.touched">
            Confirmation requise
          </mat-error>
        </mat-form-field>
      </div>

      <button mat-flat-button color="primary" type="submit" [disabled]="registerForm.invalid" class="btn-register">
        S'inscrire
      </button>
    </form>
  </div>
</div>
