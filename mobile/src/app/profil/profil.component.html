<div class="profil">
  <div class="profil-infos">
    <ion-avatar aria-hidden="true" slot="start">
      <img alt="" src="https://ionicframework.com/docs/img/demos/avatar.svg" />
    </ion-avatar>
    <ion-label class="label-name">{{ fistname }} {{name}}</ion-label>
    <p class="label-email">{{email}}</p>
  </div>

  <div class="location-list">
    <h3>Vos locations</h3>
    <div *ngFor="let location of locationsForUser">
      <a [routerLink]="['/location', location.id]">
        <ion-item>
          <img src="{{location.car.car_picture}}" class="img-car">

          <div class="location-info">
            <span>{{location.car.car_brand}} {{location.car.car_model}}</span><br>
            <span>Date de retrait : {{formatDate(location.retrait.withdrawal_date)}}</span>
            <span>Date de retour : {{ formatDate(location.retour.return_date) }}</span>
          </div>
        </ion-item>
      </a>
    </div>
  </div>

</div>
